# ══════════════════════════════════════════════════════════════════════════════
# AutoPatch — Full CI/CD Pipeline
# ══════════════════════════════════════════════════════════════════════════════
# This workflow:
#   1. Checks out the TARGET repo (the one being scanned/fixed)
#   2. Runs a SonarQube scan to find issues
#   3. Runs the AutoPatch AI agent to fix those issues
#   4. Runs a verification scan to confirm fixes
#   5. Creates a Pull Request with the fixes
#
# Triggers:
#   - Manual dispatch (workflow_dispatch) with configurable options
#   - Scheduled (weekly Monday 6AM UTC)
#   - Can be called by other workflows (workflow_call)
# ══════════════════════════════════════════════════════════════════════════════

name: 🛡️ AutoPatch — Scan, Fix & PR

on:
  # ── Manual trigger from GitHub UI ──────────────────────────────────────
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repository to scan (owner/repo format)'
        required: true
        type: string
      target_branch:
        description: 'Branch to scan and fix'
        required: false
        default: 'main'
        type: string
      sonar_project_key:
        description: 'SonarCloud project key'
        required: true
        type: string
      sonar_organization:
        description: 'SonarCloud organization key'
        required: true
        type: string
      max_iterations:
        description: 'Max fix-verify iterations (1-5)'
        required: false
        default: '3'
        type: string
      skip_verification:
        description: 'Skip post-fix verification scan (faster)'
        required: false
        default: false
        type: boolean

  # ── Weekly scheduled scan ──────────────────────────────────────────────
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6AM UTC

  # ── Reusable workflow (can be called by other repos) ───────────────────
  workflow_call:
    inputs:
      target_repo:
        required: true
        type: string
      target_branch:
        required: false
        default: 'main'
        type: string
      sonar_project_key:
        required: true
        type: string
      max_iterations:
        required: false
        default: '3'
        type: string
    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_ORGANIZATION:
        required: true
      GROQ_API_KEY:
        required: true
      TARGET_REPO_TOKEN:
        required: false

permissions:
  contents: write
  pull-requests: write
  actions: read

env:
  SONAR_HOST_URL: https://sonarcloud.io
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  SONAR_ORGANIZATION: ${{ inputs.sonar_organization || secrets.SONAR_ORGANIZATION }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  # ════════════════════════════════════════════════════════════════════════
  #  Job 1: Scan & Fix
  # ════════════════════════════════════════════════════════════════════════
  autopatch:
    name: 🧠 Scan → Fix → PR
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      fixes_applied: ${{ steps.agent.outputs.fixes_applied }}
      issues_found: ${{ steps.agent.outputs.issues_found }}
      has_fixes: ${{ steps.agent.outputs.has_fixes }}

    steps:
      # ── 1. Checkout the AutoPatch tool itself ──────────────────────────
      - name: 📦 Checkout AutoPatch
        uses: actions/checkout@v4
        with:
          path: autopatch-tool

      # ── 2. Checkout the TARGET repository to scan ──────────────────────
      - name: 📦 Checkout Target Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target_repo || github.repository }}
          ref: ${{ inputs.target_branch || 'main' }}
          token: ${{ secrets.TARGET_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          path: target-repo
          fetch-depth: 0

      # ── 3. Setup Python ────────────────────────────────────────────────
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: autopatch-tool/requirements.txt

      # ── 4. Install AutoPatch dependencies ──────────────────────────────
      - name: 📥 Install Dependencies
        run: |
          cd autopatch-tool
          pip install -r requirements.txt

      # ── 5. Install SonarQube Scanner CLI ───────────────────────────────
      - name: 📡 Install SonarQube Scanner
        run: |
          SCANNER_VERSION="6.2.1.4610"
          curl -sSLo /tmp/scanner.zip "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SCANNER_VERSION}-linux-x64.zip"
          unzip -q /tmp/scanner.zip -d /opt
          ln -s /opt/sonar-scanner-${SCANNER_VERSION}-linux-x64/bin/sonar-scanner /usr/local/bin/sonar-scanner
          sonar-scanner --version

      # ── 6. Run AutoPatch Agent ─────────────────────────────────────────
      - name: 🧠 Run AutoPatch Agent
        id: agent
        working-directory: autopatch-tool
        env:
          PROJECT_PATH: ${{ github.workspace }}/target-repo
          SONAR_PROJECT_KEY: ${{ inputs.sonar_project_key || secrets.SONAR_PROJECT_KEY }}
          GITHUB_TOKEN: ${{ secrets.TARGET_REPO_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          python -m sonar_agent \
            --project-key "${SONAR_PROJECT_KEY}" \
            --branch "${{ inputs.target_branch || 'main' }}" \
            --repo-url "https://github.com/${{ inputs.target_repo || github.repository }}.git" \
            --max-iterations ${{ inputs.max_iterations || '3' }} \
            --output-report ${{ github.workspace }}/autopatch-report.json \
            --output-markdown ${{ github.workspace }}/autopatch-report.md \
            ${{ inputs.skip_verification && '--skip-verification-scan' || '' }}

      # ── 7. Create fix branch & commit in target repo ───────────────────
      - name: 📝 Commit Fixes to Branch
        if: steps.agent.outputs.has_fixes == 'true'
        working-directory: target-repo
        run: |
          BRANCH_NAME="autopatch/fixes-$(date +%Y%m%d-%H%M%S)"
          echo "BRANCH_NAME=${BRANCH_NAME}" >> $GITHUB_ENV

          git config user.name "AutoPatch Bot"
          git config user.email "autopatch[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH_NAME}"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "🛡️ autopatch: ${FIXES_COUNT} automated code quality fixes

          Applied by AutoPatch AI Agent
          - Issues found: ${{ steps.agent.outputs.issues_found }}
          - Fixes applied: ${{ steps.agent.outputs.fixes_applied }}
          - Remaining: ${{ steps.agent.outputs.remaining_issues }}"

          git push origin "${BRANCH_NAME}"
        env:
          FIXES_COUNT: ${{ steps.agent.outputs.fixes_applied }}

      # ── 8. Create Pull Request ─────────────────────────────────────────
      - name: 🚀 Create Pull Request
        if: steps.agent.outputs.has_fixes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.TARGET_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          path: target-repo
          branch: ${{ env.BRANCH_NAME }}
          base: ${{ inputs.target_branch || 'main' }}
          title: "🛡️ AutoPatch: ${{ steps.agent.outputs.fixes_applied }} automated code quality fixes"
          body-path: ${{ github.workspace }}/autopatch-report.md
          labels: |
            autopatch
            automated-fix
            code-quality
          reviewers: ${{ github.actor }}
          draft: false

      # ── 9. Upload artifacts ────────────────────────────────────────────
      - name: 📊 Upload Report Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autopatch-report-${{ github.run_number }}
          path: |
            ${{ github.workspace }}/autopatch-report.json
            ${{ github.workspace }}/autopatch-report.md
          retention-days: 30

      # ── 10. Post summary ───────────────────────────────────────────────
      - name: 📋 Post Run Summary
        if: always()
        run: |
          if [ -f "${{ github.workspace }}/autopatch-report.md" ]; then
            cat "${{ github.workspace }}/autopatch-report.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ AutoPatch" >> $GITHUB_STEP_SUMMARY
            echo "No report was generated. Check the logs for errors." >> $GITHUB_STEP_SUMMARY
          fi
